name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron:  '0 6 * * 3' # Every Wednesday at 06:00 UTC


jobs:
  renovate:
    name: "Renovate"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Renovate
        uses: renovatebot/github-action@v46.1.2
        with:
          configurationFile: .github/renovate-global.json5
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          LOG_LEVEL: "debug"
